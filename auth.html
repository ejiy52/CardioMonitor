<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Авторизация - CardioMonitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
    <a href="index.html" class="logo-link">💙 CardioMonitor</a>
</header>

<main class="container">
    <div class="auth-card">
        <h2>Вход в систему</h2>
        <div class="form-group">
            <label>Электронная почта</label>
            <input type="email" placeholder="например, patient@mail.ru">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" placeholder="***************">
        </div>

        <div class="auth-links" style="margin-bottom: 20px;">
            <a href="#">Забыли пароль?</a>
        </div>

        <div class="demo-nav-box">
            <p><strong>Выберите роль для перехода в демо-режиме:</strong></p>
            <a href="patient_input.html" class="demo-btn">Войти как Пациент</a>
            <a href="doctor_panel.html" class="demo-btn" style="background:#28a745;">Войти как Врач</a>
        </div>
    </div>
</main>
</body>
</html>
